<!DOCTYPE html>
<html lang="en" class="scroll-smooth" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysian Strings | Become a Client</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        amber: { 500: '#d4af37', 600: '#c5a059', 700: '#b8860b' },
                        dark: { 900: '#0a0a0a', 950: '#050505' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col items-center justify-start sm:justify-center p-6 relative overflow-x-hidden">
    
    <!-- Fixed Top Bar for Toggles -->
    <header class="fixed top-0 left-0 right-0 z-[100] px-6 py-3 flex justify-end items-center bg-gray-50 dark:bg-gray-950 border-b border-gray-200 dark:border-gray-800 transition-none shadow-sm">
        <div class="flex items-center gap-4">
            <button id="theme-toggle" class="group w-9 h-9 flex items-center justify-center rounded-full bg-gray-200 dark:bg-gray-800 hover:bg-amber-600 hover:scale-110 transition-all duration-300 hover:bg-amber-700 hover:scale-105 hover:shadow-xl hover:shadow-amber-600/40 active:scale-95 transition-all duration-300">
                <svg class="hidden dark:block w-5 h-5 text-amber-500 group-hover:text-white transition-colors group-hover:text-white transition-colors" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" /></svg>
                <svg class="block dark:hidden w-5 h-5 text-gray-700 group-hover:text-white transition-colors group-hover:text-white transition-colors" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" /></svg>
            </button>
            <button id="rtl-toggle" class="w-9 h-9 flex-shrink-0 flex items-center justify-center text-[10px] font-bold rounded-full bg-gray-200 dark:bg-gray-800 hover:bg-amber-600 hover:text-white transition-all uppercase hover:bg-amber-700 hover:scale-105 hover:shadow-xl hover:shadow-amber-600/40 active:scale-95 transition-all duration-300">RTL</button>
        </div>
    </header>

    <!-- Signup Card -->
    <div class="max-w-lg w-full animate-fade-up z-10 mt-28 sm:mt-32 sm:mb-12">
        <div class="bg-white dark:bg-gray-900 p-6 py-10 md:p-12 rounded-[2.5rem] shadow-2xl border border-gray-100 dark:border-gray-800 relative z-10">
            <!-- Branding -->
            <div class="text-center mb-10">
                 <a href="index.html" class="flex items-center justify-center gap-4 group">
                    <div class="w-12 h-12 bg-amber-600 rounded-full flex items-center justify-center shadow-xl shadow-amber-600/30 transform group-hover:rotate-12 transition-transform duration-500 hover:bg-amber-700 hover:scale-105 hover:shadow-xl hover:shadow-amber-600/40 active:scale-95 transition-all duration-300">
                         <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                        </svg>
                    </div>
                    <span class="text-xl sm:text-3xl font-serif font-bold tracking-tight text-amber-600 uppercase">ELYSIAN<span class="text-gray-900 dark:text-gray-100 italic group-hover:text-amber-600 transition-colors duration-300">STRINGS</span></span>
                </a>
                <p class="mt-6 text-gray-400 font-sans text-sm">Create an account to manage your booking contracts & repertoire</p>
            </div>

            <!-- Form -->
            <form id="signup-form" class="space-y-6" data-validate>
                <div class="space-y-2">
                    <label class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-gray-400 ml-1 font-sans whitespace-nowrap">First Name&nbsp;*</label>
                    <input type="text" required placeholder="Elena" class="w-full px-6 py-4 rounded-xl bg-gray-50 dark:bg-gray-800 border border-transparent focus:border-amber-600 focus:outline-none transition-all placeholder:opacity-50">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-gray-400 ml-1 font-sans whitespace-nowrap">Last Name&nbsp;*</label>
                    <input type="text" required placeholder="Moretti" class="w-full px-6 py-4 rounded-xl bg-gray-50 dark:bg-gray-800 border border-transparent focus:border-amber-600 focus:outline-none transition-all placeholder:opacity-50">
                </div>
                
                <div class="space-y-2">
                    <label class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-gray-400 ml-1 whitespace-nowrap">Email Address&nbsp;*</label>
                    <input type="email" required placeholder="name@company.com" class="w-full px-6 py-4 rounded-xl bg-gray-50 dark:bg-gray-800 border border-transparent focus:border-amber-600 focus:outline-none transition-all">
                </div>
                
                <div class="space-y-2">
                    <label class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-gray-400 ml-1 whitespace-nowrap">Create Password&nbsp;*</label>
                    <input type="password" required placeholder="Min. 8 characters" class="w-full px-6 py-4 rounded-xl bg-gray-50 dark:bg-gray-800 border border-transparent focus:border-amber-600 focus:outline-none transition-all">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-gray-400 ml-1 whitespace-nowrap">Confirm Password&nbsp;*</label>
                    <input type="password" required placeholder="••••••••" class="w-full px-6 py-4 rounded-xl bg-gray-50 dark:bg-gray-800 border border-transparent focus:border-amber-600 focus:outline-none transition-all">
                </div>

                <div class="flex items-start gap-3 mt-4">
                    <input type="checkbox" id="terms" required class="w-5 h-5 rounded border-gray-300 text-amber-600 focus:ring-amber-600 mt-0.5 cursor-pointer">
                    <label for="terms" class="text-sm text-gray-500 leading-snug cursor-pointer">I acknowledge that I have read and agree to the <a href="#" class="text-amber-600 font-bold hover:underline">Client Terms of Engagement</a> and Privacy Policy.</label>
                </div>

                <button type="submit" class="w-full py-5 bg-amber-600 text-white rounded-xl font-bold text-base md:text-lg hover:bg-amber-700 transition-all shadow-xl shadow-amber-600/20 active:scale-95 whitespace-nowrap px-4 hover:bg-amber-700 hover:scale-105 hover:shadow-xl hover:shadow-amber-600/40 active:scale-95 transition-all duration-300">Register and Access Portal</button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-100 dark:border-gray-800 text-center">
                 <p class="text-xs sm:text-sm text-gray-500 whitespace-nowrap">Already have an account? <a href="login.html" class="text-amber-600 font-bold hover:underline">Log In</a></p>
            </div>
        </div>


    </div>

    <!-- Background Decoration -->
    <div class="absolute inset-x-0 bottom-0 z-0 opacity-10 pointer-events-none overflow-hidden">
         <img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&q=80&w=1500" class="w-full h-96 object-cover object-bottom">
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
