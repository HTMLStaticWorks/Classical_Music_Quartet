<!DOCTYPE html>
<html lang="en" class="scroll-smooth" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysian Portal | Client Portal Access</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        amber: { 500: '#d4af37', 600: '#c5a059', 700: '#b8860b' },
                        dark: { 900: '#0a0a0a', 950: '#050505' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col items-center justify-start sm:justify-center p-6 relative overflow-x-hidden">
    
    <!-- Fixed Top Bar for Toggles -->
    <header class="fixed top-0 left-0 w-full z-[100] h-14 flex items-center justify-end px-6 bg-gray-50 dark:bg-gray-950 border-b border-gray-200 dark:border-gray-800 transition-none shadow-sm">
        <button id="theme-toggle" class="group w-9 h-9 flex items-center justify-center rounded-full bg-gray-200 dark:bg-gray-800 hover:bg-amber-600 hover:scale-110 transition-all duration-300 hover:bg-amber-700 hover:scale-105 hover:shadow-xl hover:shadow-amber-600/40 active:scale-95 transition-all duration-300">
            <svg class="hidden dark:block w-5 h-5 text-amber-500 group-hover:text-white transition-colors group-hover:text-white transition-colors" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" /></svg>
            <svg class="block dark:hidden w-5 h-5 text-gray-700 group-hover:text-white transition-colors group-hover:text-white transition-colors" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" /></svg>
        </button>
        <button id="rtl-toggle" class="w-9 h-9 flex-shrink-0 flex items-center justify-center text-[10px] font-bold rounded-full bg-gray-200 dark:bg-gray-800 hover:bg-amber-600 hover:text-white transition-all uppercase hover:bg-amber-700 hover:scale-105 hover:shadow-xl hover:shadow-amber-600/40 active:scale-95 transition-all duration-300">RTL</button>
    </header>

    <!-- Login Card -->
    <div class="max-w-md w-full animate-fade-up z-10 mt-28 sm:mt-32 sm:mb-12">
        <div class="bg-white dark:bg-gray-900 p-6 py-10 md:p-12 rounded-[2.5rem] shadow-2xl border border-gray-100 dark:border-gray-800 relative z-10">
            <!-- Branding -->
            <div class="text-center mb-10">
                 <a href="index.html" class="flex items-center justify-center gap-4 group">
                    <div class="w-12 h-12 bg-amber-600 rounded-full flex items-center justify-center shadow-xl shadow-amber-600/30 transform group-hover:rotate-12 transition-transform duration-500 hover:bg-amber-700 hover:scale-105 hover:shadow-xl hover:shadow-amber-600/40 active:scale-95 transition-all duration-300">
                         <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                        </svg>
                    </div>
                    <span class="text-xl sm:text-3xl font-serif font-bold tracking-tight text-amber-600 uppercase">ELYSIAN<span class="text-gray-900 dark:text-gray-100 italic group-hover:text-amber-600 transition-colors duration-300">STRINGS</span></span>
                </a>
                <p class="mt-6 text-gray-400 font-sans text-sm">Access your client booking records & schedule</p>
            </div>

            <!-- Form -->
            <form id="login-form" class="space-y-6" data-validate>
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-gray-400 ml-1">Email / Client ID</label>
                    <input type="email" required class="w-full px-6 py-4 rounded-xl bg-gray-50 dark:bg-gray-800 border border-transparent focus:border-amber-600 focus:outline-none transition-all">
                </div>
                <div class="space-y-3">
                    <label class="text-xs font-bold uppercase tracking-widest text-gray-400 ml-1">Password</label>
                    <div class="relative group/pass">
                        <input type="password" id="password" required class="w-full px-6 py-4 rounded-xl bg-gray-50 dark:bg-gray-800 border border-transparent focus:border-amber-600 focus:outline-none transition-all pr-14">
                        <button type="button" class="password-toggle absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center text-gray-400 hover:text-amber-600 transition-colors focus:outline-none" data-target="password">
                            <svg class="eye-off w-5 h-5 transition-all duration-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                            </svg>
                            <svg class="eye-on hidden w-5 h-5 transition-all duration-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.644C3.399 8.31 7.31 5 12 5c4.69 0 8.601 3.31 9.964 6.678c.07.172.07.365 0 .537C20.601 15.69 16.69 19 12 19c-4.69 0-8.601-3.31-9.964-6.678z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <!-- Alignment fix: same line -->
                <div class="flex items-center justify-between gap-2 mb-2 px-1">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="remember" class="w-4 h-4 rounded border-gray-300 text-amber-600 focus:ring-amber-600 cursor-pointer">
                        <label for="remember" class="text-xs sm:text-sm text-gray-500 cursor-pointer">Remember me</label>
                    </div>
                    <a href="#" class="text-xs text-amber-600 font-bold hover:underline transition-all">Forgot password?</a>
                </div>
                <button type="submit" class="w-full py-5 bg-amber-600 text-white rounded-xl font-bold text-lg uppercase tracking-widest hover:bg-amber-700 transition-all shadow-xl shadow-amber-600/20 active:scale-95 hover:bg-amber-700 hover:scale-105 hover:shadow-xl hover:shadow-amber-600/40 active:scale-95 transition-all duration-300 block">LOGIN</button>
            </form>

            <!-- Social Login Divider -->
            <div class="mt-8 flex flex-col gap-4">
                <div class="relative flex items-center justify-center">
                    <div class="flex-grow border-t border-gray-100 dark:border-gray-800"></div>
                    <span class="px-4 text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400 bg-white dark:bg-gray-900">Or continue with</span>
                    <div class="flex-grow border-t border-gray-100 dark:border-gray-800"></div>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <button class="w-full py-4 bg-black text-white rounded-xl font-bold text-sm flex items-center justify-center gap-3 hover:bg-gray-900 transition-all shadow-lg shadow-black/10 active:scale-95 border border-transparent dark:border-gray-800 group">
                        <svg class="w-5 h-5 fill-current transition-transform group-hover:scale-110" viewBox="0 0 384 512">
                            <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.8-76.4-19.7-36.3.1-71.9 21.6-88.5 57.8-32.8 71.4-8.3 167.2 23 211.6 15.6 22.4 33.8 48 56.4 47.3 22.5-.7 31-14.4 58.4-14.4 27.1 0 35.1 14.4 58.4 14.4 23.8.1 40.3-23.2 56-45.8 17.5-25.2 24.1-50.6 24.3-51.9-1.1-.4-47.5-18.3-48-73.6zM285.9 83.4c21.8-26.1 34.2-61.9 29.5-98.1-30.7 1.2-61.4 20.3-83.3 46.2-18.6 21.9-35.5 56.6-29.2 92.5 34.4 2.6 63.6-16.1 83-40.6z"/>
                        </svg>
                        Continue with Apple
                    </button>
                    
                    <!-- Google Option for symmetry -->
                    <button class="w-full py-4 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-xl font-bold text-sm flex items-center justify-center gap-3 hover:bg-gray-50 dark:hover:bg-gray-750 transition-all shadow-md active:scale-95 border border-gray-100 dark:border-gray-700 group">
                        <svg class="w-5 h-5 transition-transform group-hover:scale-110" viewBox="0 0 48 48">
                            <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path>
                            <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path>
                            <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path>
                            <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path>
                        </svg>
                        Continue with Google
                    </button>
                </div>
            </div>

            <div class="mt-10 pt-8 border-t border-gray-100 dark:border-gray-800 text-center">
                <p class="text-xs sm:text-sm text-gray-500 whitespace-nowrap">First time here? <a href="signup.html" class="text-amber-600 font-bold hover:underline">Create Client Account</a></p>
            </div>
        </div>


    </div>

    <!-- Background Decoration -->
    <div class="absolute inset-0 z-0 flex items-center justify-center pointer-events-none opacity-5 overflow-hidden">
         <span class="text-[40rem] font-serif italic text-amber-600 scale-150">&</span>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
